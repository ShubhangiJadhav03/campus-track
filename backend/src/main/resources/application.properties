# ==========================
# Server Configuration
# ==========================
server.port=${PORT:8080}
server.servlet.context-path=/api


# ==========================
# Database Configuration (Render PostgreSQL)
# ==========================
spring.datasource.url=${DATABASE_URL}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# ==========================
# JPA / Hibernate
# ==========================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


# ==========================
# JWT Configuration
# ==========================
app.jwt.secret=${JWT_SECRET:collegeComplaintSystemSecretKey2024VeryLongSecretKeyForHS512Algorithm}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000


# ==========================
# File Upload
# ==========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=./uploads


# ==========================
# Mail Configuration
# ==========================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@college.edu}
spring.mail.password=${MAIL_PASSWORD:password}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=${MAIL_FROM:noreply@college.edu}
app.mail.enabled=false


# ==========================
# CORS
# ==========================
app.cors.allowed-origins=*


# ==========================
# Logging
# ==========================
logging.level.com.college.complaints=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN


# ==========================
# OpenAPI
# ==========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true